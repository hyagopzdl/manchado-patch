                      ovr: Math.max(1, Math.min(99, parseInt(e.target.value) || 0)),
                    })
                  }
                />
              </div>

              <div style={{ flex: 1 }}>
                <label style={lbl}>Idade</label>

                <input
                  type="number"
                  min={15}
                  max={45}
                  style={inputStyle}
                  value={form.age}
                  onChange={(e) => setForm({ ...form, age: parseInt(e.target.value) || 0 })}
                />
              </div>
            </div>

            <button
              className="tapbtn"
              style={{ ...bigBtn, ...btnPrimary, marginTop: 18 }}
              disabled={!form.name.trim()}
              onClick={() => onSave(data.teamId, form)}
            >
              {editing ? "Salvar alterações" : "Adicionar ao elenco"}
            </button>
          </Modal>
        );
      }

      // ============ NEW TOURNAMENT MODAL ============

      function NewTournamentModal({
        teams,
        tourForm,
        setTourForm,
        onClose,
        onToggleTeam,
        onCreate,
      }) {
        const canCreate =
          tourForm.name.trim() &&
          tourForm.teamIds.length >= 2 &&
          (tourForm.format !== "grupos" || tourForm.teamIds.length >= 4);

        return (
          <Modal title="Novo campeonato" onClose={onClose}>
            <label style={lbl}>Nome do campeonato</label>

            <input
              style={inputStyle}
              value={tourForm.name}
              onChange={(e) => setTourForm({ ...tourForm, name: e.target.value })}
              placeholder="Ex: Copa Retrô 2007"
              autoFocus
            />

            <label style={{ ...lbl, marginTop: 14 }}>Formato</label>

            <div style={{ display: "flex", flexDirection: "column", gap: 8, marginBottom: 4 }}>
              {[
                {
                  k: "liga",
                  t: "Liga (pontos corridos)",
                  d: "Todos contra todos, tabela de classificação.",
                },

                {
                  k: "mata-mata",
                  t: "Mata-mata (eliminatória)",
                  d: "Jogo único, perdeu está fora. Empate decide nos pênaltis.",
                },

                {
                  k: "grupos",
                  t: "Grupos + Mata-mata",
                  d: "Fase de grupos e depois eliminatórias com os classificados.",
                },
              ].map((f) => (
                <button
                  key={f.k}
                  onClick={() => setTourForm({ ...tourForm, format: f.k })}
                  style={{
                    textAlign: "left",
                    padding: 12,
                    borderRadius: 10,
                    cursor: "pointer",

                    background: tourForm.format === f.k ? "rgba(212,175,55,0.12)" : "#0E1E16",

                    border: tourForm.format === f.k ? "1px solid #D4AF37" : "1px solid #24402F",
                    color: "#EDEFE7",
                  }}
                >
                  <div style={{ fontWeight: 700, fontSize: 14 }}>{f.t}</div>

                  <div style={{ fontSize: 11.5, color: "#9AAA9F", marginTop: 2 }}>{f.d}</div>
                </button>
              ))}
            </div>

            {tourForm.format === "grupos" && (
              <>
                <label style={{ ...lbl, marginTop: 10 }}>Número de grupos</label>

                <div style={{ display: "flex", gap: 8, marginBottom: 4 }}>
                  {[2, 4].map((n) => (
                    <span
                      key={n}
                      onClick={() => setTourForm({ ...tourForm, numGroups: n })}
                      style={chip(tourForm.numGroups === n)}
                    >
                      {n} grupos
                    </span>
                  ))}
                </div>
              </>
            )}

            <label style={{ ...lbl, marginTop: 14 }}>
              Times participantes ({tourForm.teamIds.length} selecionados)
            </label>

            {teams.length === 0 && (
              <div style={{ fontSize: 12.5, color: "#C1443D", marginBottom: 8 }}>
                Crie times na aba Elenco primeiro.
              </div>
            )}

            <div style={{ display: "flex", flexDirection: "column", gap: 6, marginBottom: 14 }}>
              {teams.map((t) => {
                const selected = tourForm.teamIds.includes(t.id);

                return (
                  <button
                    key={t.id}
                    onClick={() => onToggleTeam(t.id)}
                    style={{
                      display: "flex",
                      alignItems: "center",
                      gap: 10,
                      padding: 10,
                      borderRadius: 10,
                      cursor: "pointer",

                      background: selected ? "rgba(47,122,77,0.15)" : "#0E1E16",
                      border: selected ? "1px solid #2F7A4D" : "1px solid #24402F",
                      color: "#EDEFE7",
                    }}
                  >
                    <span style={{ width: 8, height: 8, borderRadius: 3, background: t.color }} />

                    <span style={{ flex: 1, textAlign: "left", fontSize: 14, fontWeight: 600 }}>
                      {t.name}
                    </span>

                    {selected && <Check size={16} color="#8FD6A8" />}
                  </button>
                );
              })}
            </div>

            {tourForm.format === "grupos" &&
              tourForm.teamIds.length > 0 &&
              tourForm.teamIds.length < 4 && (
                <div
                  style={{
                    fontSize: 12,
                    color: "#C1443D",
                    marginBottom: 10,
                    display: "flex",
                    gap: 6,
                    alignItems: "center",
                  }}
                >
                  <AlertCircle size={14} /> Selecione pelo menos 4 times para grupos.
                </div>
              )}

            <button
              className="tapbtn"
              disabled={!canCreate}
              onClick={onCreate}
              style={{ ...bigBtn, ...btnPrimary, opacity: canCreate ? 1 : 0.5 }}
            >
              Iniciar campeonato
            </button>
          </Modal>
        );
      }

      // ============ MATCH MODAL ============

      function MatchModal({
        match,
        teamById,
        scoreDraft,
        setScoreDraft,
        onClose,
        onSave,
        addScorer,
        removeScorer,
      }) {
        const home = teamById(match.homeId),
          away = teamById(match.awayId);

        const isDraw =
          scoreDraft.home !== "" &&
          scoreDraft.away !== "" &&
          parseInt(scoreDraft.home) === parseInt(scoreDraft.away);

        const needsPenalties = match.stage === "knockout" && isDraw;

        return (
          <Modal title="Resultado da partida" onClose={onClose}>
            <div
              style={{
                display: "flex",
                alignItems: "center",
                justifyContent: "center",
                gap: 16,
                marginBottom: 18,
              }}
            >
              <div style={{ textAlign: "center", flex: 1 }}>
                <div style={{ fontWeight: 700, fontSize: 13.5, marginBottom: 8 }}>{home?.name}</div>

                <input
                  type="number"
                  min={0}
                  style={{
                    ...inputStyle,
                    textAlign: "center",
                    fontSize: 22,
                    fontWeight: 800,
                    padding: "10px 0",
                  }}
                  value={scoreDraft.home}
                  onChange={(e) => setScoreDraft({ ...scoreDraft, home: e.target.value })}
                />
              </div>

              <span style={{ fontSize: 18, color: "#6B7A6F", marginTop: 20 }}>×</span>

              <div style={{ textAlign: "center", flex: 1 }}>
                <div style={{ fontWeight: 700, fontSize: 13.5, marginBottom: 8 }}>{away?.name}</div>

                <input
                  type="number"
                  min={0}
                  style={{
                    ...inputStyle,
                    textAlign: "center",
                    fontSize: 22,
                    fontWeight: 800,
                    padding: "10px 0",
                  }}
                  value={scoreDraft.away}
                  onChange={(e) => setScoreDraft({ ...scoreDraft, away: e.target.value })}
                />
              </div>
            </div>

            {needsPenalties && (
              <div style={{ marginBottom: 16 }}>
                <label style={lbl}>Empate — vencedor nos pênaltis</label>

                <div style={{ display: "flex", gap: 8 }}>
                  <span
                    onClick={() => setScoreDraft({ ...scoreDraft, penaltyWinner: match.homeId })}
                    style={{
                      ...chip(scoreDraft.penaltyWinner === match.homeId),
                      flex: 1,
                      textAlign: "center",
                    }}
                  >
                    {home?.name}
                  </span>

                  <span
                    onClick={() => setScoreDraft({ ...scoreDraft, penaltyWinner: match.awayId })}
                    style={{
                      ...chip(scoreDraft.penaltyWinner === match.awayId),
                      flex: 1,
                      textAlign: "center",
                    }}
                  >
                    {away?.name}
                  </span>
                </div>
              </div>
            )}

            <label style={lbl}>Gols marcados (opcional)</label>

            <div style={{ display: "flex", gap: 8, marginBottom: 10 }}>
              <PlayerScorerPicker
                team={home}
                onPick={(pid, pname) => addScorer(match.homeId, pid, pname)}
              />

              <PlayerScorerPicker
                team={away}
                onPick={(pid, pname) => addScorer(match.awayId, pid, pname)}
              />
            </div>

            {scoreDraft.scorers.length > 0 && (
              <div style={{ marginBottom: 14 }}>
                {scoreDraft.scorers.map((s, i) => (
                  <div
                    key={i}
                    style={{
                      display: "flex",
                      alignItems: "center",
                      justifyContent: "space-between",
                      fontSize: 13,
                      padding: "5px 0",
                      borderBottom:
                        i < scoreDraft.scorers.length - 1 ? "1px solid #1E3528" : "none",
                    }}
                  >
                    <span>
                      <Target
                        size={12}
                        style={{ verticalAlign: -1, marginRight: 5 }}
                        color="#D4AF37"
                      />
                      {s.playerName}
                    </span>

                    <button
                      onClick={() => removeScorer(i)}
                      style={{
                        background: "none",
                        border: "none",
                        color: "#C1443D",
                        cursor: "pointer",
                      }}
                    >
                      <X size={14} />
                    </button>
                  </div>
                ))}
              </div>
            )}

            <button className="tapbtn" onClick={onSave} style={{ ...bigBtn, ...btnPrimary }}>
              Salvar resultado
            </button>
          </Modal>
        );
      }

      function PlayerScorerPicker({ team, onPick }) {
        const [open, setOpen] = useState(false);

        if (!team) return <div style={{ flex: 1 }} />;

        return (
          <div style={{ position: "relative", flex: 1 }}>
            <button
              onClick={() => setOpen((o) => !o)}
              style={{
                width: "100%",
                padding: "9px 10px",
                borderRadius: 8,
                background: "#0E1E16",
                border: "1px solid #24402F",
                color: "#9AAA9F",
                fontSize: 12,
                cursor: "pointer",
                display: "flex",
                alignItems: "center",
                justifyContent: "space-between",
              }}
            >
              + Gol {team.name} <ChevronDown size={13} />
            </button>

            {open && (
              <div
                style={{
                  position: "absolute",
                  top: "105%",
                  left: 0,
                  right: 0,
                  background: "#182B20",
                  border: "1px solid #2F4A38",
                  borderRadius: 8,
                  zIndex: 5,
                  maxHeight: 160,
                  overflowY: "auto",
                }}
              >
                {team.players.length === 0 && (
                  <div style={{ padding: 10, fontSize: 12, color: "#6B7A6F" }}>Sem jogadores</div>
                )}

                {team.players.map((p) => (
                  <div
                    key={p.id}
                    onClick={() => {
                      onPick(p.id, p.name);
                      setOpen(false);
                    }}
                    style={{
                      padding: "8px 10px",
                      fontSize: 12.5,
                      cursor: "pointer",
                      borderBottom: "1px solid #1E3528",
                    }}
                  >
                    {p.name}
                  </div>
                ))}
              </div>
            )}
          </div>
        );
      }

      // ============ TRANSFER MODAL ============

      function TransferModal({ pick, teams, onClose, onConfirm }) {
        const { player, fromTeamId } = pick;

        const from = teams.find((t) => t.id === fromTeamId);

        const [dest, setDest] = useState(null);

        return (
          <Modal title="Transferir jogador" onClose={onClose}>
            <div style={{ ...panelStyle, marginBottom: 16 }}>
              <div style={{ fontWeight: 700, fontSize: 15 }}>{player.name}</div>

              <div style={{ fontSize: 12, color: "#9AAA9F" }}>
                {from?.name} · OVR {player.ovr} · {POS_LABELS[player.pos]}
              </div>
            </div>

            <label style={lbl}>Destino</label>

            <div style={{ display: "flex", flexDirection: "column", gap: 6, marginBottom: 18 }}>
              {teams
                .filter((t) => t.id !== fromTeamId)
                .map((t) => (
                  <button
                    key={t.id}
                    onClick={() => setDest(t.id)}
                    style={{
                      display: "flex",
                      alignItems: "center",
                      gap: 10,
                      padding: 10,
                      borderRadius: 10,
                      cursor: "pointer",

                      background: dest === t.id ? "rgba(212,175,55,0.12)" : "#0E1E16",
                      border: dest === t.id ? "1px solid #D4AF37" : "1px solid #24402F",
                      color: "#EDEFE7",
                    }}
                  >
                    <span style={{ width: 8, height: 8, borderRadius: 3, background: t.color }} />

                    <span style={{ flex: 1, textAlign: "left", fontSize: 14 }}>{t.name}</span>

                    {dest === t.id && <Check size={16} color="#D4AF37" />}
                  </button>
                ))}

              {teams.length <= 1 && (
                <div style={{ fontSize: 12.5, color: "#6B7A6F" }}>
                  Crie outro time para transferir.
                </div>
              )}
            </div>

            <button
              className="tapbtn"
              disabled={!dest}
              onClick={() => onConfirm(player, fromTeamId, dest)}
              style={{ ...bigBtn, ...btnPrimary, opacity: dest ? 1 : 0.5 }}
            >
              Confirmar transferência
            </button>
          </Modal>
        );
      }

      const root = ReactDOM.createRoot(document.getElementById("root"));

      root.render(<App />);
    </script>
  </body>
</html>
