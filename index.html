      html[data-theme="dark"] {
        color-scheme: dark;
        --canvas: #11110f;
        --surface: #1a1917;
        --surface-soft: #24221f;
        --surface-sand: #201f1c;
        --ink: #f8f5f0;
        --heading: #f5f1ea;
        --body: #d2cec7;
        --muted: #96918a;
        --border: #34312c;
        --blue: #64c6ff;
        --green: #20d98a;
        --orange: #ff6940;
        --yellow: #ffcd6c;
        --pink: #ff79bd;
        --violet: #b678ff;
        --danger: #ff5864;
        --on-dark: #121212;
        --overlay: rgba(0,0,0,.72);
        --shadow-soft: 0 1px 8px rgba(0,0,0,.18);
      }
      html, body { margin: 0; padding: 0; background: var(--canvas); }
      body { color: var(--body); font-family: "Manrope", ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; transition: background .2s ease, color .2s ease; }
      * { box-sizing: border-box; }
      ::-webkit-scrollbar { display: none; }
      button, input, select, textarea { font: inherit; }
      button { transition: transform .12s ease, opacity .12s ease; }
      button:hover { opacity: .88; }
      button:active { transform: translateY(1px); }
      input:focus, select:focus, textarea:focus { outline: none; border-color: var(--blue) !important; box-shadow: 0 0 0 3px color-mix(in srgb, var(--blue) 18%, transparent) !important; }
      h1, h2, h3, h4, [data-display-heading] { color: var(--heading) !important; letter-spacing: -.02em; }
      code { background: var(--surface-soft); color: var(--heading); padding: 2px 5px; border-radius: 4px; }
      #root > div { background: var(--canvas) !important; color: var(--body) !important; }
      #root input, #root select, #root textarea {
        background: var(--surface) !important; color: var(--heading) !important;
        border-color: var(--border) !important; border-radius: 10px !important;
      }
      #root input::placeholder, #root textarea::placeholder { color: var(--muted); }
      #root table { color: var(--body); }
      #root th { color: var(--muted) !important; }
      #root td, #root th { border-color: var(--border) !important; }
      .family-card { background: var(--surface) !important; color: var(--body) !important; border: 0 !important; border-radius: 10px !important; box-shadow: var(--shadow-inset) !important; }
      .family-pill-primary { background: var(--ink) !important; color: var(--on-dark) !important; border: 0 !important; border-radius: 9999px !important; }
      .family-pill-secondary { background: var(--surface-sand) !important; color: var(--heading) !important; border: 0 !important; border-radius: 9999px !important; box-shadow: var(--shadow-inset) !important; }
      .settings-theme-card { cursor: pointer; padding: 18px; border-radius: 10px; background: var(--surface); box-shadow: var(--shadow-inset); border: 0; text-align: left; color: var(--body); }
      .settings-theme-card.is-active { box-shadow: inset 0 0 0 2px var(--ink); }
      .theme-preview { height: 96px; border-radius: 8px; padding: 12px; display: flex; flex-direction: column; gap: 8px; margin-bottom: 14px; }
      .theme-preview.light { background:#fbfaf9; box-shadow:inset 0 0 0 1px #e9e4dd; }
      .theme-preview.dark { background:#11110f; box-shadow:inset 0 0 0 1px #34312c; }
      .theme-preview span { display:block; height:10px; border-radius:999px; }
      .theme-preview span:first-child { width:45%; }
      .theme-preview span:nth-child(2) { width:75%; }
      .theme-preview span:nth-child(3) { width:58%; }
      .theme-preview.light span { background:#343433; }
      .theme-preview.dark span { background:#f5f1ea; }
      @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
      .animate-spin { animation: spin 1s linear infinite; }
      @media (max-width: 560px) { body { background: var(--canvas); } }
      .profile-gate { background: radial-gradient(700px 420px at 50% 20%, rgba(33,228,147,.08), transparent 68%), linear-gradient(180deg,#050807 0%,#080d0b 100%); }
      .profile-choice-avatar { transition: transform .22s cubic-bezier(.2,.8,.2,1), box-shadow .22s ease, border-color .22s ease; }
      @media (hover:hover) { .profile-choice:hover .profile-choice-avatar { transform:scale(1.055); border-color:rgba(255,255,255,.8) !important; box-shadow:0 24px 60px rgba(0,0,0,.38),0 0 28px rgba(33,228,147,.12) !important; } }

      /* Sports premium responsive system */
      :root {
        --canvas: #f4f6f8;
        --surface: rgba(255,255,255,.92);
        --surface-soft: #edf1f4;
        --surface-sand: #e7ebef;
        --ink: #07110d;
        --heading: #101916;
        --body: #33413c;
        --muted: #75817c;
        --border: rgba(15,35,27,.10);
        --green: #10d981;
        --green-strong: #00b968;
        --blue: #2088ff;
        --overlay: rgba(4,10,8,.56);
        --shadow-inset: inset 0 0 0 1px var(--border);
        --shadow-soft: 0 18px 50px rgba(12,28,21,.08), inset 0 0 0 1px var(--border);
        --shadow-float: 0 22px 70px rgba(4,12,9,.18), 0 0 0 1px rgba(255,255,255,.45) inset;
      }
      html[data-theme="dark"] {
        --canvas: #050807;
        --surface: rgba(15,20,18,.88);
        --surface-soft: #151b18;
        --surface-sand: #1b221f;
        --ink: #f7fbf9;
        --heading: #f4faf7;
        --body: #c5d0cb;
        --muted: #7f8d87;
        --border: rgba(226,255,241,.09);
        --green: #21e493;
        --green-strong: #0bc87b;
        --blue: #5aa7ff;
        --overlay: rgba(0,0,0,.76);
        --shadow-soft: 0 18px 55px rgba(0,0,0,.32), inset 0 0 0 1px var(--border);
        --shadow-float: 0 24px 80px rgba(0,0,0,.52), 0 0 0 1px rgba(255,255,255,.08) inset;
      }
      html { min-height: 100%; background: var(--canvas); }
      body {
        min-height: 100vh;
        background:
          radial-gradient(900px 540px at 15% -10%, color-mix(in srgb, var(--green) 11%, transparent), transparent 64%),
          radial-gradient(720px 500px at 95% 8%, color-mix(in srgb, var(--blue) 8%, transparent), transparent 62%),
          var(--canvas);
        background-attachment: fixed;
      }
      html[data-theme="dark"] body {
        background:
          radial-gradient(850px 520px at 12% -8%, rgba(33,228,147,.12), transparent 64%),
          radial-gradient(760px 520px at 100% 4%, rgba(43,116,255,.10), transparent 64%),
          linear-gradient(180deg, #050807 0%, #080d0b 100%);
      }
      button { -webkit-tap-highlight-color: transparent; }
      @media (hover:hover) {
        button:hover { opacity: 1; transform: translateY(-1px); }
        .family-card:hover, .sports-hover:hover { transform: translateY(-2px); box-shadow: 0 20px 54px rgba(7,18,13,.10), inset 0 0 0 1px color-mix(in srgb, var(--green) 28%, var(--border)); }
        html[data-theme="dark"] .family-card:hover, html[data-theme="dark"] .sports-hover:hover { box-shadow: 0 22px 58px rgba(0,0,0,.42), 0 0 34px rgba(33,228,147,.06), inset 0 0 0 1px rgba(33,228,147,.2); }
      }
      button:active { transform: scale(.975); }
      .family-card { transition: transform .2s cubic-bezier(.2,.8,.2,1), box-shadow .2s ease, background .2s ease !important; backdrop-filter: blur(18px); }
      .app-shell {
        width: 100%; max-width: 1480px; margin: 0 auto; min-height: 100vh;
        position: relative; padding-bottom: 112px;
      }
      .app-content { width: min(100%, 1280px); margin: 0 auto; padding: 34px 28px 130px; }
      .sports-dock {
        position: fixed; left: 50%; bottom: 18px; transform: translateX(-50%);
        width: min(calc(100% - 32px), 620px); height: 70px; padding: 8px;
        display: flex; align-items: center; gap: 4px; z-index: 40;
        border-radius: 26px; background: color-mix(in srgb, var(--surface) 88%, transparent);
        border: 1px solid var(--border); box-shadow: var(--shadow-float);
        backdrop-filter: blur(24px) saturate(150%); -webkit-backdrop-filter: blur(24px) saturate(150%);
      }
      .sports-tab { min-width: 68px; flex: 1; height: 54px; position: relative; border: 0; border-radius: 19px; background: transparent; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:4px; cursor:pointer; color:var(--muted); transition:background .18s ease,color .18s ease,transform .18s ease; }
      .sports-tab.is-active { background: color-mix(in srgb, var(--green) 14%, var(--surface-soft)); color:var(--heading); }
      .sports-tab-avatar { width:24px; height:24px; border-radius:50%; overflow:hidden; display:grid; place-items:center; font-size:10px; font-weight:800; color:#fff; background:var(--green-strong); box-shadow:0 0 0 2px color-mix(in srgb,var(--surface) 85%,transparent); }
      .sports-tab-avatar img { width:100%; height:100%; object-fit:cover; }
      .sports-fab { position:fixed !important; z-index:45 !important; left:50% !important; bottom:72px !important; transform:translateX(-50%) !important; width:62px !important; height:62px !important; border:1px solid rgba(255,255,255,.3) !important; background:linear-gradient(145deg,#29ec9b,#00b968) !important; box-shadow:0 14px 38px rgba(0,201,120,.32),0 0 32px rgba(33,228,147,.18),inset 0 1px 0 rgba(255,255,255,.45) !important; }
      .sports-fab:hover { transform:translateX(-50%) translateY(-2px) scale(1.03) !important; }
      .unified-player-grid { display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); width:100%; gap:12px; }
      .unified-player-card { width:100%; min-width:0; height:242px; padding:13px; border-radius:22px; display:grid; grid-template-rows:42px minmax(0,1fr) 38px; row-gap:16px; }
      .unified-player-action { width:100%; height:38px; border-radius:999px; padding:0 9px; font-size:11.5px; font-weight:800; display:flex; align-items:center; justify-content:center; text-align:center; }
      .market-highlight-card { flex:0 0 calc((100% - 12px)/2); scroll-snap-align:start; }
      .market-recommendation-rail { display:flex; gap:12px; overflow-x:auto; padding:18px 4px 30px; margin:-14px -4px -10px; scroll-snap-type:x mandatory; scrollbar-width:none; }
      .market-recommendation-rail::-webkit-scrollbar { display:none; }
      @media (min-width: 760px) { .unified-player-grid { grid-template-columns:repeat(3,minmax(0,1fr)); } .market-highlight-card { flex-basis:calc((100% - 24px)/3); } }
      @media (min-width: 1120px) { .unified-player-grid { grid-template-columns:repeat(5,minmax(0,1fr)); } .market-highlight-card { flex-basis:calc((100% - 48px)/5); } }
      .sports-modal-overlay { animation: sportsFadeIn .2s ease both; z-index:1000 !important; backdrop-filter: blur(10px); -webkit-backdrop-filter:blur(10px); }
      .sports-modal { animation: sportsModalIn .28s cubic-bezier(.2,.9,.2,1) both; background:color-mix(in srgb,var(--surface) 94%,transparent) !important; border:1px solid var(--border) !important; box-shadow:var(--shadow-float) !important; backdrop-filter:blur(28px) saturate(145%); -webkit-backdrop-filter:blur(28px) saturate(145%); }

      .player-detail-modal { padding:0 !important; overflow:hidden !important; display:flex; flex-direction:column; }
      .player-detail-scroll { min-height:0; overflow-y:auto; padding:24px 24px 18px; overscroll-behavior:contain; }
      .player-detail-footer { flex:0 0 auto; width:100%; padding:14px 24px calc(14px + env(safe-area-inset-bottom)); background:color-mix(in srgb,var(--surface) 96%,transparent); backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px); border-top:1px solid var(--border); }
      .player-detail-close { position:fixed; top:max(16px,env(safe-area-inset-top)); right:16px; z-index:1002; width:42px; height:42px; border-radius:999px; border:1px solid var(--border); background:color-mix(in srgb,var(--surface) 88%,transparent); color:var(--heading); display:grid; place-items:center; box-shadow:var(--shadow-sm); backdrop-filter:blur(18px); -webkit-backdrop-filter:blur(18px); cursor:pointer; }
      @media (max-width:899px) { .player-detail-scroll { padding:22px 18px 16px; } .player-detail-footer { padding-left:18px; padding-right:18px; } }
      @keyframes sportsFadeIn { from { opacity:0 } to { opacity:1 } }
      @keyframes sportsModalIn { from { opacity:0; transform:translateY(24px) scale(.975) } to { opacity:1; transform:translateY(0) scale(1) } }
      @keyframes sportsPageIn { from { opacity:0; transform:translateY(10px) } to { opacity:1; transform:translateY(0) } }
      .app-content > * { animation:sportsPageIn .28s ease both; }
      #root input, #root select, #root textarea { min-height:46px; border-radius:14px !important; background:color-mix(in srgb,var(--surface) 88%,transparent) !important; transition:border-color .16s ease,box-shadow .16s ease,background .16s ease; }
      #root table { border-collapse:separate; border-spacing:0; }
      #root th { font-size:11px !important; letter-spacing:.07em; text-transform:uppercase; }
      #root h1,#root h2,#root h3 { font-weight:800 !important; letter-spacing:-.035em !important; }
      @media (min-width: 900px) {
        .app-shell { padding-bottom: 105px; }
        .app-content { padding-top: 48px; }
        .sports-dock { bottom:24px; width:auto; min-width:560px; }
        .sports-tab { min-width:100px; flex:none; padding:0 18px; flex-direction:row; gap:9px; }
        .sports-tab span:last-child { font-size:12px !important; }
        .sports-tab.is-active::after { bottom:6px; }
        .sports-fab { bottom:88px !important; }
        .sports-modal-overlay { align-items:center !important; padding:32px !important; }
        .sports-modal { border-radius:28px !important; width:min(720px,100%) !important; max-height:min(86vh,900px) !important; padding:26px !important; }
      }
      @media (min-width: 1200px) {
        .app-content { padding-left:48px; padding-right:48px; }
      }
      @media (max-width: 899px) {
        .app-content { padding:24px 16px 126px; }
        .sports-dock { bottom:10px; width:calc(100% - 20px); height:66px; border-radius:24px; }
        .sports-tab { height:50px; min-width:58px; }
        .sports-tab-label { font-size:9.5px !important; }
        .sports-fab { bottom:60px !important; width:58px !important; height:58px !important; }
        .sports-modal-overlay { align-items:flex-end !important; }
        .sports-modal { border-radius:26px 26px 0 0 !important; border-bottom:0 !important; width:100% !important; max-height:90vh !important; padding:20px 18px calc(20px + env(safe-area-inset-bottom)) !important; }
      }
      @media (prefers-reduced-motion: reduce) { *,*::before,*::after { animation-duration:.01ms !important; transition-duration:.01ms !important; scroll-behavior:auto !important; } }
