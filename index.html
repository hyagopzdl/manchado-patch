    <script type="text/babel" data-presets="react">
      const { useState, useEffect, useCallback, useMemo } = React;

      function makeIcon(emoji) {
        return function Icon({ size = 16, color, style = {}, className }) {
          return React.createElement(
            "span",
            {
              className,

              style: {
                fontSize: size,
                color,
                lineHeight: 1,
                display: "inline-flex",
                verticalAlign: "middle",
                ...style,
              },
            },
            emoji,
          );
        };
      }

      const Home = makeIcon("🏠");

      const Shield = makeIcon("🛡️");

      const History = makeIcon("📜");

      const POSITIONS = ["GOL", "ZAG", "LAT", "VOL", "MEI", "ATA"];

      const POS_LABELS = {
        GOL: "Goleiro",
        ZAG: "Zagueiro",
        LAT: "Lateral",
        VOL: "Volante",
        MEI: "Meia",
        ATA: "Atacante",
      };

      const TEAM_COLORS = [
        "#D4AF37",
        "#4A7FC1",
        "#C1443D",
        "#2F7A4D",
        "#9B59B6",
        "#E67E22",
        "#1ABC9C",
        "#95A5A6",
      ];

      const uid = () => Math.random().toString(36).slice(2, 10) + Date.now().toString(36).slice(-4);

      function shuffle(arr) {
        const a = [...arr];

        for (let i = a.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));

          [a[i], a[j]] = [a[j], a[i]];
        }

        return a;
      }

      function generateRoundRobin(teamIds) {
        let arr = [...teamIds];

        if (arr.length % 2 !== 0) arr.push(null);

        const n = arr.length;

        const rounds = [];

        for (let r = 0; r < n - 1; r++) {
          const roundMatches = [];

          for (let i = 0; i < n / 2; i++) {
            const home = arr[i],
              away = arr[n - 1 - i];

            if (home !== null && away !== null) {
              roundMatches.push(r % 2 === 0 ? { home, away } : { home: away, away: home });
            }
          }

          rounds.push(roundMatches);

          const fixed = arr[0];

          const rest = arr.slice(1);

          rest.unshift(rest.pop());

          arr = [fixed, ...rest];
        }

        return rounds;
      }

      function generateKnockoutRound(teamIds) {
        const s = shuffle(teamIds);

        const matches = [];

        for (let i = 0; i < s.length; i += 2) {
          if (i + 1 < s.length) matches.push({ home: s[i], away: s[i + 1], bye: false });
          else matches.push({ home: s[i], away: null, bye: true });
        }

        return matches;
      }

      function splitGroups(teamIds, numGroups) {
        const s = shuffle(teamIds);

        const groups = Array.from({ length: numGroups }, () => []);

        s.forEach((id, i) => groups[i % numGroups].push(id));

        return groups;
      }

      function computeStandings(teamIds, matches) {
        const table = {};

        teamIds.forEach((id) => {
          table[id] = { id, pj: 0, v: 0, e: 0, d: 0, gp: 0, gc: 0, sg: 0, pts: 0 };
        });

        matches.forEach((m) => {
          if (!m.played || m.bye) return;

          const h = table[m.homeId],
            a = table[m.awayId];

          if (!h || !a) return;

          h.pj++;
          a.pj++;

          h.gp += m.homeScore;
          h.gc += m.awayScore;

          a.gp += m.awayScore;
          a.gc += m.homeScore;

          if (m.homeScore > m.awayScore) {
            h.v++;
            a.d++;
            h.pts += 3;
          } else if (m.homeScore < m.awayScore) {
            a.v++;
            h.d++;
            a.pts += 3;
          } else {
            h.e++;
            a.e++;
            h.pts += 1;
            a.pts += 1;
          }
        });

        Object.values(table).forEach((t) => (t.sg = t.gp - t.gc));

        return Object.values(table).sort((x, y) => y.pts - x.pts || y.sg - x.sg || y.gp - x.gp);
      }

      function matchWinner(m) {
        if (m.bye) return m.home;

        if (!m.played) return null;

        if (m.homeScore > m.awayScore) return m.homeId;

        if (m.awayScore > m.homeScore) return m.awayId;

        return m.penaltyWinner || null;
      }

      // ---------- FIREBASE STORAGE (shared, realtime) ----------

      // Config is set at the bottom of this file (window.__FIREBASE_CONFIG__) — see instructions.

      let db = null;

      function getDb() {
        if (db) return db;

        if (window.firebase && window.__FIREBASE_CONFIG__ && window.__FIREBASE_CONFIG__.apiKey) {
          if (!window.firebase.apps.length)
            window.firebase.initializeApp(window.__FIREBASE_CONFIG__);

          db = window.firebase.database();
        }

        return db;
      }

      function dbSet(path, value) {
        const d = getDb();

        if (!d) return Promise.resolve();

        return d
          .ref("pes/" + path)
          .set(value === undefined ? null : value)
          .catch((e) => console.error("firebase set failed", path, e));
      }

      function dbSubscribe(path, cb) {
        const d = getDb();

        if (!d) {
          cb(null);
          return () => {};
        }

        const ref = d.ref("pes/" + path);

        const handler = (snap) => cb(snap.val());

        ref.on("value", handler);

        return () => ref.off("value", handler);
      }

      // personal, per-browser (not shared) — just remembers which profile this device picked

      function localGet(key) {
        try {
          const v = localStorage.getItem(key);
          return v ? JSON.parse(v) : null;
        } catch (e) {
          return null;
        }
      }

      function localSet(key, value) {
        try {
          localStorage.setItem(key, JSON.stringify(value));
        } catch (e) {
          /* ignore */
        }
      }

      const btnPrimary = {
        background: "linear-gradient(180deg,#E8C766,#D4AF37)",

        color: "#12241C",

        fontWeight: 700,
      };

      function App() {
        const [loading, setLoading] = useState(true);

        const [teams, setTeams] = useState([]);

        const [tournaments, setTournaments] = useState([]);

        const [transfers, setTransfers] = useState([]);

        const [meta, setMeta] = useState({ currentTournamentId: null, seasonCounter: 1 });

        const [tab, setTab] = useState("home");

        const [profiles, setProfiles] = useState([]);

        const [myProfile, setMyProfile] = useState(null);

        const [profileReady, setProfileReady] = useState(false);

        const [newProfileName, setNewProfileName] = useState("");

        // modal / UI states

        const [teamModal, setTeamModal] = useState(false);

        const [teamForm, setTeamForm] = useState({ name: "", color: TEAM_COLORS[0] });

        const [activeTeamId, setActiveTeamId] = useState(null);

        const [playerModal, setPlayerModal] = useState(null); // {teamId, player|null}

        const [newTourModal, setNewTourModal] = useState(false);

        const [tourForm, setTourForm] = useState({
          name: "",
          format: "liga",
          teamIds: [],
          numGroups: 2,
        });

        const [matchModal, setMatchModal] = useState(null); // match object

        const [scoreDraft, setScoreDraft] = useState({
          home: "",
          away: "",
          scorers: [],
          penaltyWinner: null,
        });

        const [transferPick, setTransferPick] = useState(null); // player being transferred

        const [historyOpen, setHistoryOpen] = useState(null);

        const [groupTab, setGroupTab] = useState(0);

        const [firebaseMissing, setFirebaseMissing] = useState(false);

        useEffect(() => {
          if (!getDb()) {
            setFirebaseMissing(true);
            setLoading(false);
            return;
          }

          setMyProfile(localGet("pes-my-profile"));

          setProfileReady(true);

          const offTeams = dbSubscribe("teams", (v) => {
            setTeams(v || []);
            setLoading(false);
          });

          const offTours = dbSubscribe("tournaments", (v) => setTournaments(v || []));

          const offTransfers = dbSubscribe("transfers", (v) => setTransfers(v || []));

          const offMeta = dbSubscribe("meta", (v) =>
            setMeta(v || { currentTournamentId: null, seasonCounter: 1 }),
          );

          const offProfiles = dbSubscribe("profiles", (v) => setProfiles(v || []));

          return () => {
            offTeams();
            offTours();
            offTransfers();
            offMeta();
            offProfiles();
          };
        }, []);

        function pickProfile(name) {
          setMyProfile(name);

          localSet("pes-my-profile", name);

          if (!profiles.includes(name)) {
            const next = [...profiles, name];

            setProfiles(next);

            dbSet("profiles", next);
          }
        }

        function switchProfile() {
          setMyProfile(null);

          localSet("pes-my-profile", null);
        }

        const persistTeams = useCallback((next) => {
          setTeams(next);
          dbSet("teams", next);
        }, []);

        const persistTournaments = useCallback((next) => {
          setTournaments(next);
          dbSet("tournaments", next);
        }, []);

        const persistTransfers = useCallback((next) => {
          setTransfers(next);
          dbSet("transfers", next);
        }, []);

        const persistMeta = useCallback((next) => {
          setMeta(next);
          dbSet("meta", next);
        }, []);

        const currentTournament = useMemo(
          () => tournaments.find((t) => t.id === meta.currentTournamentId) || null,

          [tournaments, meta.currentTournamentId],
        );

        const teamById = useCallback((id) => teams.find((t) => t.id === id), [teams]);

        // ---------- TEAM MANAGEMENT ----------

        function openNewTeam() {
          setTeamForm({ name: "", color: TEAM_COLORS[teams.length % TEAM_COLORS.length] });

          setTeamModal(true);
        }

        function saveNewTeam() {
          if (!teamForm.name.trim()) return;

          const newTeam = {
            id: uid(),
            name: teamForm.name.trim(),
            color: teamForm.color,
            players: [],
          };

          persistTeams([...teams, newTeam]);

          setTeamModal(false);
        }

        function deleteTeam(id) {
          persistTeams(teams.filter((t) => t.id !== id));

          if (activeTeamId === id) setActiveTeamId(null);
        }

        function savePlayer(teamId, player) {
          const next = teams.map((t) => {
            if (t.id !== teamId) return t;

            const exists = t.players.some((p) => p.id === player.id);

            const players = exists
              ? t.players.map((p) => (p.id === player.id ? player : p))
              : [...t.players, player];

            return { ...t, players };
          });

          persistTeams(next);

          setPlayerModal(null);
        }

        function deletePlayer(teamId, playerId) {
          const next = teams.map((t) =>
            t.id === teamId ? { ...t, players: t.players.filter((p) => p.id !== playerId) } : t,
          );

          persistTeams(next);
        }

        // ---------- TOURNAMENT CREATION ----------

        function openNewTournament() {
          setTourForm({
            name: `Temporada ${meta.seasonCounter}`,
            format: "liga",
            teamIds: [],
            numGroups: 2,
          });

          setNewTourModal(true);
        }

        function toggleTourTeam(id) {
          setTourForm((f) => ({
            ...f,

            teamIds: f.teamIds.includes(id)
              ? f.teamIds.filter((x) => x !== id)
              : [...f.teamIds, id],
          }));
        }

        function createTournament() {
          const { name, format, teamIds, numGroups } = tourForm;

          if (!name.trim() || teamIds.length < 2) return;

          let matches = [];

          let groups = null;

          if (format === "liga") {
            const rounds = generateRoundRobin(teamIds);

            rounds.forEach((round, ri) => {
              round.forEach((m) => {
                matches.push({
                  id: uid(),
                  stage: "league",
                  round: ri + 1,
                  homeId: m.home,
                  awayId: m.away,
                  homeScore: 0,
                  awayScore: 0,
                  played: false,
                  bye: false,
                  scorers: [],
                });
              });
            });
          } else if (format === "mata-mata") {
            const r1 = generateKnockoutRound(teamIds);

            matches = r1.map((m) => ({
              id: uid(),
              stage: "knockout",
              round: 1,
              homeId: m.home,
              awayId: m.away,
              homeScore: 0,
              awayScore: 0,
              played: m.bye,
              bye: m.bye,
              scorers: [],
            }));
          } else if (format === "grupos") {
            const ng = teamIds.length >= 8 ? numGroups : 2;

            const gArr = splitGroups(teamIds, ng);

            groups = gArr.map((ids, i) => ({
              name: `Grupo ${String.fromCharCode(65 + i)}`,
              teamIds: ids,
            }));

            groups.forEach((g) => {
              const rounds = generateRoundRobin(g.teamIds);

              rounds.forEach((round, ri) => {
                round.forEach((m) => {
                  matches.push({
                    id: uid(),
                    stage: "group",
                    groupName: g.name,
                    round: ri + 1,
                    homeId: m.home,
                    awayId: m.away,
                    homeScore: 0,
                    awayScore: 0,
                    played: false,
                    bye: false,
                    scorers: [],
                  });
                });
              });
            });
          }

          const tour = {
            id: uid(),
            name: name.trim(),
            format,
            season: meta.seasonCounter,

            teamIds,
            groups,
            matches,
            status: "ongoing",
            champion: null,
            createdAt: Date.now(),
          };

          persistTournaments([...tournaments, tour]);

          persistMeta({ ...meta, currentTournamentId: tour.id });

          setNewTourModal(false);

          setTab("tournament");
        }

        // ---------- MATCH RESULT ----------

        function openMatch(m) {
          setMatchModal(m);

          setScoreDraft({
            home: m.played ? String(m.homeScore) : "",

            away: m.played ? String(m.awayScore) : "",

            scorers: m.scorers || [],

            penaltyWinner: m.penaltyWinner || null,
          });
        }

        function addScorer(teamId, playerId, playerName) {
          setScoreDraft((d) => ({
            ...d,
            scorers: [...d.scorers, { teamId, playerId, playerName }],
          }));
        }

        function removeScorer(idx) {
          setScoreDraft((d) => ({ ...d, scorers: d.scorers.filter((_, i) => i !== idx) }));
        }

        function saveMatchResult() {
          if (!matchModal) return;

          const hs = parseInt(scoreDraft.home, 10);

          const as = parseInt(scoreDraft.away, 10);

          if (isNaN(hs) || isNaN(as)) return;

          if (hs === as && matchModal.stage === "knockout" && !scoreDraft.penaltyWinner) return;

          // revert previous goal counts if editing an already played match

          let nextTeams = teams;

          if (matchModal.played && matchModal.scorers && matchModal.scorers.length) {
            nextTeams = nextTeams.map((t) => ({
              ...t,

              players: t.players.map((p) => {
                const count = matchModal.scorers.filter((s) => s.playerId === p.id).length;

                return count ? { ...p, goals: Math.max(0, (p.goals || 0) - count) } : p;
              }),
            }));
          }

          // apply new goal counts

          nextTeams = nextTeams.map((t) => ({
            ...t,

            players: t.players.map((p) => {
              const count = scoreDraft.scorers.filter((s) => s.playerId === p.id).length;

              return count ? { ...p, goals: (p.goals || 0) + count } : p;
            }),
          }));

          const updatedMatch = {
            ...matchModal,
            played: true,
            homeScore: hs,
            awayScore: as,

            scorers: scoreDraft.scorers,
            penaltyWinner: scoreDraft.penaltyWinner,
          };

          const nextMatches = currentTournament.matches.map((m) =>
            m.id === matchModal.id ? updatedMatch : m,
          );

          const nextTour = { ...currentTournament, matches: nextMatches };

          persistTeams(nextTeams);

          persistTournaments(tournaments.map((t) => (t.id === nextTour.id ? nextTour : t)));

          setMatchModal(null);
        }

        // ---------- ADVANCE STAGE ----------

        function stageComplete(matches, filterFn) {
          const relevant = matches.filter(filterFn);

          return relevant.length > 0 && relevant.every((m) => m.played);
        }

        function advanceKnockout() {
          const t = currentTournament;

          const maxRound = Math.max(
            ...t.matches.filter((m) => m.stage === "knockout").map((m) => m.round),
          );

          const roundMatches = t.matches.filter(
            (m) => m.stage === "knockout" && m.round === maxRound,
          );

          const winners = roundMatches.map(matchWinner);

          if (winners.length === 1) {
            finishTournament(winners[0]);

            return;
          }

          const nextRound = generateKnockoutRound(winners);

          const newMatches = nextRound.map((m) => ({
            id: uid(),
            stage: "knockout",
            round: maxRound + 1,
            homeId: m.home,
            awayId: m.away,

            homeScore: 0,
            awayScore: 0,
            played: m.bye,
            bye: m.bye,
            scorers: [],
          }));

          const nextTour = { ...t, matches: [...t.matches, ...newMatches] };

          persistTournaments(tournaments.map((x) => (x.id === t.id ? nextTour : x)));
        }

        function advanceFromGroups() {
          const t = currentTournament;

          const qualifiers = [];

          t.groups.forEach((g) => {
            const groupMatches = t.matches.filter(
              (m) => m.stage === "group" && m.groupName === g.name,
            );

            const standings = computeStandings(g.teamIds, groupMatches);

            qualifiers.push(...standings.slice(0, 2).map((s) => s.id));
          });

          const shuffled = shuffle(qualifiers);

          const round1 = generateKnockoutRound(shuffled);

          const newMatches = round1.map((m) => ({
            id: uid(),
            stage: "knockout",
            round: 1,
            homeId: m.home,
            awayId: m.away,

            homeScore: 0,
            awayScore: 0,
            played: m.bye,
            bye: m.bye,
            scorers: [],
          }));

          const nextTour = { ...t, matches: [...t.matches, ...newMatches] };

          persistTournaments(tournaments.map((x) => (x.id === t.id ? nextTour : x)));
        }

        function finishTournament(championId) {
          const t = { ...currentTournament, status: "finished", champion: championId };

          persistTournaments(tournaments.map((x) => (x.id === t.id ? t : x)));
        }

        function archiveSeason() {
          persistMeta({ currentTournamentId: null, seasonCounter: meta.seasonCounter + 1 });

          setTab("home");
        }

        // ---------- TRANSFERS ----------

        function executeTransfer(player, fromTeamId, toTeamId) {
          if (fromTeamId === toTeamId) return;

          const from = teamById(fromTeamId),
            to = teamById(toTeamId);

          const nextTeams = teams.map((t) => {
            if (t.id === fromTeamId)
              return { ...t, players: t.players.filter((p) => p.id !== player.id) };

            if (t.id === toTeamId) return { ...t, players: [...t.players, player] };

            return t;
          });

          const log = {
            id: uid(),
            playerId: player.id,
            playerName: player.name,
            fromTeamId,
            toTeamId,
            fromTeamName: from?.name,
            toTeamName: to?.name,
            date: new Date().toLocaleDateString("pt-BR"),
          };

          persistTeams(nextTeams);

          persistTransfers([log, ...transfers]);

          setTransferPick(null);
        }

        // ---------- DERIVED ----------

        const topScorers = useMemo(() => {
          const all = [];

          teams.forEach((t) =>
            t.players.forEach((p) => all.push({ ...p, teamName: t.name, teamColor: t.color })),
          );

          return all
            .filter((p) => (p.goals || 0) > 0)
            .sort((a, b) => (b.goals || 0) - (a.goals || 0))
            .slice(0, 10);
        }, [teams]);

        const nextMatches = useMemo(() => {
          if (!currentTournament) return [];

          return currentTournament.matches.filter((m) => !m.played && !m.bye).slice(0, 6);
        }, [currentTournament]);

        if (firebaseMissing) {
          return (
            <div
              style={{
                background: "#0A1712",
                minHeight: "100vh",
                display: "flex",
                alignItems: "center",
                justifyContent: "center",
                padding: 24,
              }}
            >
              <div
                style={{
                  color: "#EDEFE7",
                  maxWidth: 420,
                  textAlign: "center",
                  fontFamily: "system-ui",
                }}
              >
                <div style={{ fontSize: 30, marginBottom: 10 }}>⚠️</div>

                <div style={{ fontWeight: 800, fontSize: 17, marginBottom: 8 }}>
                  Configuração pendente
                </div>

                <div style={{ fontSize: 13.5, color: "#9AAA9F", lineHeight: 1.5 }}>
                  Preencha o <code style={{ color: "#D4AF37" }}>firebaseConfig</code> no topo do
                  arquivo <code style={{ color: "#D4AF37" }}>index.html</code> com os dados do seu
                  projeto Firebase para o app funcionar.
                </div>
              </div>
            </div>
          );
        }

        if (loading) {
          return (
            <div
              style={{
                background: "#0A1712",
                minHeight: "100vh",
                display: "flex",

        if (profileReady && !myProfile) {
          return (
            <ProfileGate
              profiles={profiles}
              newProfileName={newProfileName}

              onPick={pickProfile}
            />

        return (
          <div
            style={{
              minHeight: "100vh",
              background:
                "radial-gradient(circle at 15% 0%, #16301F 0%, #0A1712 45%), radial-gradient(circle at 90% 10%, #14281B 0%, #0A1712 40%)",

              color: "#EDEFE7",
              fontFamily: "system-ui,-apple-system,Segoe UI,Roboto,sans-serif",

              maxWidth: 480,
              margin: "0 auto",
              position: "relative",

          >
            <style>{`

        * { box-sizing: border-box; }

        ::-webkit-scrollbar { display: none; }

        .scoreboard { font-variant-numeric: tabular-nums; letter-spacing: 1px; }

        .tapbtn:active { transform: scale(0.97); }

        input, select { outline: none; }

        input::placeholder { color: #6B7A6F; }

      `}</style>

            <Header

              currentTournament={currentTournament}

            <div style={{ padding: "16px 16px 0" }}>
              {tab === "home" && (

              {tab === "teams" && (
                <TeamsTab

                  onNewTeam={openNewTeam}
                  onDeleteTeam={deleteTeam}

                  onEditPlayer={(teamId, player) => setPlayerModal({ teamId, player })}

                <TournamentTab

                  teamById={teamById}
                  tournament={currentTournament}
                  teamsAll={teams}
                  onNewTournament={openNewTournament}
                  onOpenMatch={openMatch}
                  groupTab={groupTab}
                  setGroupTab={setGroupTab}
                  advanceKnockout={advanceKnockout}
                  advanceFromGroups={advanceFromGroups}

                <div style={{ display: "flex", gap: 8, flexWrap: "wrap", marginBottom: 18 }}>

                    <button

                      onClick={() => setTeamForm({ ...teamForm, color: c })}

                        width: 32,
                        height: 32,
                        borderRadius: 8,

            {playerModal && (
              <PlayerModal

                onClose={() => setPlayerModal(null)}
                onSave={savePlayer}

            {newTourModal && (

                setTourForm={setTourForm}

      // ============ SHARED STYLES ============

      const lbl = {
        display: "block",
        fontSize: 12,
        textTransform: "uppercase",
        letterSpacing: 1,
        color: "#9AAA9F",
        marginBottom: 6,
      };

      const inputStyle = {
        width: "100%",
        padding: "12px 14px",
        borderRadius: 10,
        border: "1px solid #24402F",
        background: "#0F201700",
        backgroundColor: "#0E1E16",
        color: "#EDEFE7",
        fontSize: 15,
      };

      const bigBtn = {
        width: "100%",
        padding: "13px 16px",
        borderRadius: 12,
        border: "none",
        fontSize: 15,
        cursor: "pointer",
        marginTop: 4,
      };

      const panelStyle = {
        background: "#12241C",
        border: "1px solid #1E3528",
        borderRadius: 14,
        padding: 14,
        marginBottom: 12,
      };

      const chip = (active) => ({
        padding: "6px 12px",
        borderRadius: 20,
        fontSize: 12.5,
        fontWeight: 600,
        cursor: "pointer",

        background: active ? "#D4AF37" : "#1A2F24",
        color: active ? "#12241C" : "#9AAA9F",
        border: active ? "none" : "1px solid #24402F",
      });

      // ============ PROFILE GATE ============

      function ProfileGate({ profiles, newProfileName, setNewProfileName, onPick }) {
        return (
          <div
            style={{
              minHeight: "100vh",
              background:
                "radial-gradient(circle at 15% 0%, #16301F 0%, #0A1712 45%), radial-gradient(circle at 90% 10%, #14281B 0%, #0A1712 40%)",

              color: "#EDEFE7",
              fontFamily: "system-ui,-apple-system,Segoe UI,Roboto,sans-serif",
              display: "flex",
              flexDirection: "column",

              justifyContent: "center",
              padding: 24,
              maxWidth: 480,
              margin: "0 auto",
            }}
          >
            <div style={{ textAlign: "center", marginBottom: 28 }}>
              <Trophy size={34} color="#D4AF37" style={{ marginBottom: 10 }} />

              <div style={{ fontSize: 22, fontWeight: 900, letterSpacing: 1 }}>
                PES <span style={{ color: "#D4AF37" }}>MANAGER</span>
              </div>

              <div style={{ fontSize: 13, color: "#9AAA9F", marginTop: 6 }}>
                Quem é você? Escolha seu perfil pra entrar na liga.
              </div>
            </div>

            {profiles.length > 0 && (
              <div style={{ display: "flex", flexDirection: "column", gap: 8, marginBottom: 18 }}>
                {profiles.map((p) => (
                  <button
                    key={p}
                    className="tapbtn"
                    onClick={() => onPick(p)}
                    style={{
                      ...panelStyle,
                      marginBottom: 0,
                      display: "flex",
                      alignItems: "center",
                      justifyContent: "space-between",
                      cursor: "pointer",
                      width: "100%",
                      textAlign: "left",
                    }}
                  >
                    <span style={{ fontWeight: 700, fontSize: 15 }}>{p}</span>

                    <ChevronRight size={18} color="#6B7A6F" />
                  </button>
                ))}
              </div>
            )}

            <label style={lbl}>Ou entre com um nome novo</label>

            <div style={{ display: "flex", gap: 8 }}>
              <input
                style={{ ...inputStyle, flex: 1 }}
                placeholder="Seu nome"
                value={newProfileName}
                onChange={(e) => setNewProfileName(e.target.value)}
                onKeyDown={(e) => {
                  if (e.key === "Enter" && newProfileName.trim()) onPick(newProfileName.trim());
                }}
              />

              <button
                className="tapbtn"
                disabled={!newProfileName.trim()}
                onClick={() => onPick(newProfileName.trim())}
                style={{
                  ...btnPrimary,
                  border: "none",
                  borderRadius: 10,
                  padding: "0 18px",
                  fontSize: 14,
                  cursor: "pointer",
                  opacity: newProfileName.trim() ? 1 : 0.5,
                }}
              >
                Entrar
              </button>
            </div>

            <div style={{ fontSize: 11.5, color: "#6B7A6F", marginTop: 14, textAlign: "center" }}>
              Sem senha, sem conta — é só pra identificar quem é quem na liga. Todo mundo mexe no
              mesmo campeonato.
            </div>
          </div>
        );
      }

      // ============ HEADER ============

      function Header({ meta, currentTournament, myProfile, onSwitchProfile }) {
        return (
          <div
            style={{
              padding: "22px 16px 16px",
              position: "sticky",
              top: 0,
              zIndex: 5,

              background: "linear-gradient(180deg,#0A1712 60%, rgba(10,23,18,0))",
            }}
          >
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between" }}>
              <div>
                <div
                  style={{ fontSize: 22, fontWeight: 900, letterSpacing: 1.5, color: "#EDEFE7" }}
                >
                  PES <span style={{ color: "#D4AF37" }}>MANAGER</span>
                </div>

                <div
                  style={{
                    fontSize: 11,
                    letterSpacing: 2,
                    color: "#6B7A6F",
                    textTransform: "uppercase",
                    marginTop: 2,
                  }}
                >
                  Temporada {meta.seasonCounter}
                </div>
              </div>

              <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                {currentTournament && currentTournament.status === "ongoing" && (
                  <div
                    style={{
                      display: "flex",
                      alignItems: "center",
                      gap: 6,
                      background: "#1A2F24",
                      padding: "6px 10px",
                      borderRadius: 20,
                      border: "1px solid #2F7A4D",
                    }}
                  >
                    <span
                      style={{
                        width: 7,
                        height: 7,
                        borderRadius: 99,
                        background: "#2F7A4D",
                        boxShadow: "0 0 6px #2F7A4D",
                        display: "inline-block",
                      }}
                    />

                    <span
                      style={{
                        fontSize: 11,
                        color: "#8FD6A8",
                        fontWeight: 700,
                        textTransform: "uppercase",
                        letterSpacing: 0.5,
                      }}
                    >
                      Em andamento
                    </span>
                  </div>
                )}

                {myProfile && (
                  <button
                    onClick={onSwitchProfile}
                    style={{
                      background: "#1A2F24",
                      border: "1px solid #24402F",
                      color: "#EDEFE7",
                      borderRadius: 20,
                      padding: "6px 10px",

                      fontSize: 11.5,
                      fontWeight: 700,
                      cursor: "pointer",
                      display: "flex",
                      alignItems: "center",
                      gap: 5,
                    }}
                    title="Trocar perfil"
                  >
                    <Users size={12} color="#D4AF37" /> {myProfile}
                  </button>
                )}
              </div>
            </div>
          </div>
        );
      }

      // ============ SCOREBOARD ============

      function ScoreBox({ value }) {
        return (
          <span
            className="scoreboard"
            style={{
              background: "#0A1712",
              border: "1px solid #2F4A38",
              borderRadius: 6,
              padding: "3px 9px",

              color: "#F2D77A",
              fontWeight: 800,
              fontSize: 17,
              minWidth: 30,
              textAlign: "center",
              display: "inline-block",
            }}
          >
            {value}
          </span>
        );
      }

      function MatchRow({ match, teamById, onOpen }) {
        const home = teamById(match.homeId),
          away = teamById(match.awayId);

        if (match.bye) {
          return (
            <div
              style={{
                ...panelStyle,
                marginBottom: 8,
                display: "flex",
                alignItems: "center",
                justifyContent: "space-between",
                opacity: 0.75,
              }}
            >
              <span style={{ fontSize: 13.5, color: "#9AAA9F" }}>
                <b style={{ color: "#EDEFE7" }}>{home?.name}</b> avançou de bye
              </span>

              <Flag size={14} color="#6B7A6F" />
            </div>
          );
        }

        return (
          <button
            className="tapbtn"
            onClick={() => onOpen(match)}
            style={{
              ...panelStyle,
              marginBottom: 8,
              display: "flex",
              alignItems: "center",
              justifyContent: "space-between",

              width: "100%",
              cursor: "pointer",
              textAlign: "left",
              border: match.played ? "1px solid #1E3528" : "1px solid #3A5540",
            }}
          >
            <div style={{ display: "flex", flexDirection: "column", gap: 6, flex: 1 }}>
              <TeamLine team={home} />

              <TeamLine team={away} />
            </div>

            {match.played ? (
              <div
                style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 6 }}
              >
                <ScoreBox value={match.homeScore} />

                <ScoreBox value={match.awayScore} />
              </div>
            ) : (
              <div
                style={{
                  display: "flex",
                  alignItems: "center",
                  gap: 4,
                  color: "#D4AF37",
                  fontSize: 12.5,
                  fontWeight: 700,
                }}
              >
                JOGAR <ChevronRight size={16} />
              </div>
            )}
          </button>
        );
      }

      function TeamLine({ team }) {
        return (
          <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
            <span
              style={{
                width: 9,
                height: 9,
                borderRadius: 3,
                background: team?.color || "#555",
                display: "inline-block",
                flexShrink: 0,
              }}
            />

            <span style={{ fontSize: 14, fontWeight: 600 }}>{team?.name || "?"}</span>
          </div>
        );
      }

      // ============ HOME TAB ============

      function HomeTab({ teams, currentTournament, nextMatches, topScorers, onGoTournament }) {
        return (
          <div>
            {!currentTournament ? (
              <div style={{ ...panelStyle, textAlign: "center", padding: 26 }}>
                <Trophy size={30} color="#D4AF37" style={{ marginBottom: 10 }} />

                <div style={{ fontWeight: 700, fontSize: 16, marginBottom: 6 }}>
                  Nenhum campeonato ativo
                </div>

                <div style={{ fontSize: 13, color: "#9AAA9F", marginBottom: 16 }}>
                  Crie times no elenco e depois inicie um campeonato na aba Campeonato.
                </div>
              </div>
            ) : (
              <>
                <div
                  style={{ ...panelStyle, background: "linear-gradient(135deg,#16301F,#12241C)" }}
                >
                  <div
                    style={{
                      display: "flex",
                      justifyContent: "space-between",
                      alignItems: "center",
                    }}
                  >
                    <div>
                      <div
                        style={{
                          fontSize: 11,
                          color: "#8FD6A8",
                          textTransform: "uppercase",
                          letterSpacing: 1,
                          fontWeight: 700,
                        }}
                      >
                        {currentTournament.format === "liga"
                          ? "Liga"
                          : currentTournament.format === "mata-mata"
                            ? "Mata-mata"
                            : "Grupos + Mata-mata"}
                      </div>

                      <div style={{ fontSize: 18, fontWeight: 800 }}>{currentTournament.name}</div>
                    </div>

                    <button
                      className="tapbtn"
                      onClick={onGoTournament}
                      style={{
                        background: "#1A2F24",
                        border: "1px solid #2F7A4D",
                        color: "#8FD6A8",
                        borderRadius: 10,
                        padding: "8px 12px",
                        fontSize: 12.5,
                        fontWeight: 700,
                        cursor: "pointer",
                      }}
                    >
                      Ver <ChevronRight size={13} style={{ verticalAlign: -2 }} />
                    </button>
                  </div>
                </div>

                <SectionTitle icon={<Calendar size={15} />} text="Próximas partidas" />

                {nextMatches.length === 0 ? (
                  <div style={{ fontSize: 13, color: "#6B7A6F", marginBottom: 12 }}>
                    Nenhuma partida pendente. Confira a aba Campeonato.
                  </div>
                ) : (
                  nextMatches.map((m) => (
                    <MatchRow
                      key={m.id}
                      match={m}
                      teamById={(id) => teams.find((t) => t.id === id)}
                      onOpen={onGoTournament}
                    />
                  ))
                )}
              </>
            )}

            {topScorers.length > 0 && (
              <>
                <SectionTitle icon={<Target size={15} />} text="Artilheiros" />

                <div style={panelStyle}>
                  {topScorers.slice(0, 5).map((p, i) => (
                    <div
                      key={p.id}
                      style={{
                        display: "flex",
                        alignItems: "center",
                        justifyContent: "space-between",
                        padding: "6px 0",
                        borderBottom: i < 4 ? "1px solid #1E3528" : "none",
                      }}
                    >
                      <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                        <span style={{ fontSize: 12, color: "#6B7A6F", width: 16 }}>{i + 1}</span>

                        <span
                          style={{ width: 8, height: 8, borderRadius: 3, background: p.teamColor }}
                        />

                        <span style={{ fontSize: 14, fontWeight: 600 }}>{p.name}</span>

                        <span style={{ fontSize: 11.5, color: "#6B7A6F" }}>{p.teamName}</span>
                      </div>

                      <span style={{ fontWeight: 800, color: "#D4AF37" }}>{p.goals}</span>
                    </div>
                  ))}
                </div>
              </>
            )}

            <div style={{ display: "flex", gap: 12, marginTop: 6 }}>
              <StatBlock label="Times" value={teams.length} />

              <StatBlock
                label="Jogadores"
                value={teams.reduce((s, t) => s + t.players.length, 0)}
              />
            </div>
          </div>
        );
      }

      function StatBlock({ label, value }) {
        return (
          <div style={{ ...panelStyle, flex: 1, textAlign: "center" }}>
            <div style={{ fontSize: 22, fontWeight: 900, color: "#D4AF37" }}>{value}</div>

            <div
              style={{
                fontSize: 11,
                color: "#9AAA9F",
                textTransform: "uppercase",
                letterSpacing: 1,
              }}
            >
              {label}
            </div>
          </div>
        );
      }

      function SectionTitle({ icon, text }) {
        return (
          <div
            style={{
              display: "flex",
              alignItems: "center",
              gap: 6,
              margin: "18px 0 10px",
              color: "#9AAA9F",
            }}
          >
            {icon}

            <span
              style={{
                fontSize: 12.5,
                textTransform: "uppercase",
                letterSpacing: 1.2,
                fontWeight: 700,
              }}
            >
              {text}
            </span>
          </div>
        );
      }

      // ============ TEAMS TAB ============

      function TeamsTab({
        teams,
        activeTeamId,
        setActiveTeamId,
        onNewTeam,
        onDeleteTeam,
        onNewPlayer,
        onEditPlayer,
        onDeletePlayer,
      }) {
        const activeTeam = teams.find((t) => t.id === activeTeamId);

        if (activeTeam) {
          const avgOvr = activeTeam.players.length
            ? Math.round(
                activeTeam.players.reduce((s, p) => s + (p.ovr || 0), 0) /
                  activeTeam.players.length,
              )
            : 0;

          return (
            <div>
              <button
                onClick={() => setActiveTeamId(null)}
                style={{
                  background: "none",
                  border: "none",
                  color: "#9AAA9F",
                  fontSize: 13,
                  marginBottom: 10,
                  cursor: "pointer",
                  padding: 0,
                }}
              >
                ← Voltar aos times
              </button>

              <div style={{ ...panelStyle, display: "flex", alignItems: "center", gap: 12 }}>
                <span
                  style={{
                    width: 40,
                    height: 40,
                    borderRadius: 10,
                    background: activeTeam.color,
                    flexShrink: 0,
                  }}
                />

                <div style={{ flex: 1 }}>
                  <div style={{ fontWeight: 800, fontSize: 17 }}>{activeTeam.name}</div>

                  <div style={{ fontSize: 12, color: "#9AAA9F" }}>
                    {activeTeam.players.length} jogadores · Média {avgOvr} OVR
                  </div>
                </div>

                <button
                  onClick={() => onDeleteTeam(activeTeam.id)}
                  style={{
                    background: "none",
                    border: "none",
                    color: "#C1443D",
                    cursor: "pointer",
                  }}
                >
                  <Trash2 size={18} />
                </button>
              </div>

              <button
                className="tapbtn"
                onClick={() => onNewPlayer(activeTeam.id)}
                style={{
                  ...bigBtn,
                  ...btnPrimary,
                  display: "flex",
                  alignItems: "center",
                  justifyContent: "center",
                  gap: 6,
                }}
              >
                <Plus size={16} /> Adicionar jogador
              </button>

              <div style={{ marginTop: 12 }}>
                {activeTeam.players.length === 0 && (
                  <div style={{ color: "#6B7A6F", fontSize: 13, textAlign: "center", padding: 20 }}>
                    Elenco vazio. Adicione jogadores.
                  </div>
                )}

                {activeTeam.players

                  .slice()

                  .sort((a, b) => (b.ovr || 0) - (a.ovr || 0))

                  .map((p) => (
                    <div
                      key={p.id}
                      style={{
                        ...panelStyle,
                        display: "flex",
                        alignItems: "center",
                        gap: 10,
                        padding: 12,
                      }}
                    >
                      <span
                        style={{
                          fontSize: 10.5,
                          fontWeight: 800,
                          background: "#1A2F24",
                          color: "#8FD6A8",
                          padding: "3px 6px",
                          borderRadius: 6,
                          border: "1px solid #2F7A4D",
                          minWidth: 34,
                          textAlign: "center",
                        }}
                      >
                        {p.pos}
                      </span>

                      <div style={{ flex: 1 }}>
                        <div style={{ fontWeight: 700, fontSize: 14.5 }}>{p.name}</div>

                        <div style={{ fontSize: 11.5, color: "#6B7A6F" }}>
                          {p.age} anos · {p.goals || 0} gols
                        </div>
                      </div>

                      <span style={{ fontWeight: 800, color: "#D4AF37", fontSize: 15 }}>
                        {p.ovr}
                      </span>

                      <button
                        onClick={() => onEditPlayer(activeTeam.id, p)}
                        style={{
                          background: "none",
                          border: "none",
                          color: "#9AAA9F",
                          cursor: "pointer",
                        }}
                      >
                        <Edit2 size={15} />
                      </button>

                      <button
                        onClick={() => onDeletePlayer(activeTeam.id, p.id)}
                        style={{
                          background: "none",
                          border: "none",
                          color: "#C1443D",
                          cursor: "pointer",
                        }}
                      >
                        <Trash2 size={15} />
                      </button>
                    </div>

                  cursor: "pointer",

                    height: 34,

      // ============ TOURNAMENT TAB ============

      function TournamentTab({
        tournament,
        teamById,
        onNewTournament,
        onOpenMatch,
        groupTab,
        setGroupTab,
        advanceKnockout,
        advanceFromGroups,
        archiveSeason,
        finishTournament,
      }) {
        if (!tournament) {
          return (
            <div style={{ textAlign: "center", padding: "10px 0" }}>
              <div style={{ ...panelStyle, padding: 24 }}>
                <Trophy size={28} color="#D4AF37" style={{ marginBottom: 8 }} />

                <div style={{ fontWeight: 700, marginBottom: 4 }}>Sem campeonato ativo</div>

                <div style={{ fontSize: 13, color: "#9AAA9F", marginBottom: 16 }}>
                  Escolha o formato e os times participantes.
                </div>
              </div>

              <button
                className="tapbtn"
                onClick={onNewTournament}
                style={{ ...bigBtn, ...btnPrimary }}
              >
                Criar campeonato
              </button>
            </div>
          );
        }

        if (tournament.status === "finished") {
          const champ = teamById(tournament.champion);

          return (
            <div>
              <div
                style={{
                  ...panelStyle,
                  textAlign: "center",
                  padding: 28,
                  background: "linear-gradient(160deg,#20351F,#12241C)",
                }}
              >
                <Crown size={34} color="#D4AF37" style={{ marginBottom: 10 }} />

                <div
                  style={{
                    fontSize: 12,
                    color: "#8FD6A8",
                    textTransform: "uppercase",
                    letterSpacing: 1.5,
                    fontWeight: 700,
                  }}
                >
                  Campeão
                </div>

                <div style={{ fontSize: 22, fontWeight: 900, marginTop: 4 }}>{champ?.name}</div>

                <div style={{ fontSize: 12.5, color: "#9AAA9F", marginTop: 4 }}>
                  {tournament.name}
                </div>
              </div>

              <button
                className="tapbtn"
                onClick={archiveSeason}
                style={{ ...bigBtn, ...btnPrimary }}
              >
                Encerrar temporada e começar outra
              </button>

              <button
                className="tapbtn"
                onClick={onNewTournament}
                style={{
                  ...bigBtn,
                  background: "#1A2F24",
                  color: "#EDEFE7",
                  border: "1px solid #2F7A4D",
                }}
              >
                Novo campeonato agora
              </button>
            </div>
          );
        }

        if (tournament.format === "liga") {
          const standings = computeStandings(tournament.teamIds, tournament.matches);

          const rounds = [...new Set(tournament.matches.map((m) => m.round))].sort((a, b) => a - b);

          const allPlayed = tournament.matches.every((m) => m.played);

          return (
            <div>
              <StandingsTable standings={standings} teamById={teamById} />

              {allPlayed && (
                <button
                  className="tapbtn"
                  onClick={() => finishTournament(standings[0].id)}
                  style={{ ...bigBtn, ...btnPrimary, marginBottom: 14 }}
                >
                  🏆 Encerrar liga ({teamById(standings[0].id)?.name} campeão)
                </button>
              )}

              <SectionTitle icon={<Calendar size={15} />} text="Rodadas" />

              {rounds.map((r) => (
                <div key={r} style={{ marginBottom: 14 }}>
                  <div style={{ fontSize: 12, color: "#6B7A6F", marginBottom: 6, fontWeight: 700 }}>
                    RODADA {r}
                  </div>

                  {tournament.matches
                    .filter((m) => m.round === r)
                    .map((m) => (
                      <MatchRow key={m.id} match={m} teamById={teamById} onOpen={onOpenMatch} />
                    ))}
                </div>
              ))}
            </div>
          );
        }

        if (tournament.format === "mata-mata") {
          return (
            <KnockoutView
              tournament={tournament}
              teamById={teamById}
              onOpenMatch={onOpenMatch}
              advanceKnockout={advanceKnockout}
            />
          );
        }

        // grupos + mata-mata

        const groups = tournament.groups;

        const hasKnockout = tournament.matches.some((m) => m.stage === "knockout");

        const groupsComplete = groups.every((g) =>
          tournament.matches
            .filter((m) => m.stage === "group" && m.groupName === g.name)
            .every((m) => m.played),
        );

        return (
          <div>
            <div style={{ display: "flex", gap: 8, marginBottom: 14, flexWrap: "wrap" }}>
              {groups.map((g, i) => (
                <span key={g.name} onClick={() => setGroupTab(i)} style={chip(groupTab === i)}>
                  {g.name}
                </span>
              ))}

              {hasKnockout && (
                <span onClick={() => setGroupTab(-1)} style={chip(groupTab === -1)}>
                  Mata-mata
                </span>
              )}
            </div>

            {groupTab === -1 ? (
              <KnockoutView
                tournament={tournament}
                teamById={teamById}
                onOpenMatch={onOpenMatch}
                advanceKnockout={advanceKnockout}
              />
            ) : (
              <>
                {groups[groupTab] && (
                  <>
                    <StandingsTable
                      standings={computeStandings(
                        groups[groupTab].teamIds,
                        tournament.matches.filter((m) => m.groupName === groups[groupTab].name),
                      )}
                      teamById={teamById}
                      highlightTop={2}
                    />

                    {[
                      ...new Set(
                        tournament.matches
                          .filter((m) => m.groupName === groups[groupTab].name)
                          .map((m) => m.round),
                      ),
                    ]
                      .sort((a, b) => a - b)
                      .map((r) => (
                        <div key={r} style={{ marginBottom: 14 }}>
                          <div
                            style={{
                              fontSize: 12,
                              color: "#6B7A6F",
                              marginBottom: 6,
                              fontWeight: 700,
                            }}
                          >
                            RODADA {r}
                          </div>

                          {tournament.matches
                            .filter((m) => m.groupName === groups[groupTab].name && m.round === r)
                            .map((m) => (
                              <MatchRow
                                key={m.id}
                                match={m}
                                teamById={teamById}
                                onOpen={onOpenMatch}
                              />
                            ))}
                        </div>
                      ))}
                  </>
                )}

                {groupsComplete && !hasKnockout && (
                  <button
                    className="tapbtn"
                    onClick={advanceFromGroups}
                    style={{ ...bigBtn, ...btnPrimary }}
                  >
                    Gerar fase eliminatória (top 2 de cada grupo)
                  </button>
                )}
              </>
            )}
          </div>
        );
      }

      function KnockoutView({ tournament, teamById, onOpenMatch, advanceKnockout }) {
        const knockoutMatches = tournament.matches.filter((m) => m.stage === "knockout");

        const rounds = [...new Set(knockoutMatches.map((m) => m.round))].sort((a, b) => a - b);

        const maxRound = Math.max(...rounds);

        const roundLabel = (r, total) => {
          const remaining = total - r + 1;

          const teamsInRound = knockoutMatches.filter((m) => m.round === r).length * 2;

          if (teamsInRound <= 2) return "FINAL";

          if (teamsInRound <= 4) return "SEMIFINAL";

          if (teamsInRound <= 8) return "QUARTAS DE FINAL";

          return `FASE DE ${teamsInRound}`;
        };

        const currentRoundMatches = knockoutMatches.filter((m) => m.round === maxRound);

        const currentComplete = currentRoundMatches.every((m) => m.played);

        const winnersCount = currentComplete ? currentRoundMatches.length : null;

        return (
          <div>
            {rounds.map((r) => (
              <div key={r} style={{ marginBottom: 16 }}>
                <div
                  style={{
                    fontSize: 12,
                    color: "#6B7A6F",
                    marginBottom: 6,
                    fontWeight: 700,
                    letterSpacing: 1,
                  }}
                >
                  {roundLabel(r, maxRound)}
                </div>

                {knockoutMatches
                  .filter((m) => m.round === r)
                  .map((m) => (
                    <div key={m.id}>
                      <MatchRow match={m} teamById={teamById} onOpen={onOpenMatch} />

                      {m.played && !m.bye && m.homeScore === m.awayScore && m.penaltyWinner && (
                        <div
                          style={{
                            fontSize: 11.5,
                            color: "#9AAA9F",
                            marginTop: -4,
                            marginBottom: 8,
                            paddingLeft: 4,
                          }}
                        >
                          Pênaltis: {teamById(m.penaltyWinner)?.name} venceu
                        </div>
                      )}
                    </div>
                  ))}
              </div>
            ))}

            {currentComplete && winnersCount > 1 && (
              <button
                className="tapbtn"
                onClick={advanceKnockout}
                style={{ ...bigBtn, ...btnPrimary }}
              >
                Gerar próxima fase
              </button>
            )}

            {currentComplete && winnersCount === 1 && (
              <button
                className="tapbtn"
                onClick={advanceKnockout}
                style={{ ...bigBtn, ...btnPrimary }}
              >
                🏆 Coroar campeão
              </button>
            )}
          </div>
        );
      }

      function StandingsTable({ standings, teamById, highlightTop }) {
        return (
          <div style={{ ...panelStyle, padding: 10, marginBottom: 16, overflowX: "auto" }}>
            <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 12.5 }}>
              <thead>
                <tr style={{ color: "#6B7A6F", textTransform: "uppercase", fontSize: 10.5 }}>
                  <th style={{ textAlign: "left", padding: "4px 4px" }}>#</th>

                  <th style={thNum}>PJ</th>

                  <th style={thNum}>D</th>

                  <th style={thNum}>SG</th>

                  <th style={thNum}>Pts</th>
                </tr>
              </thead>

              <tbody>
                {standings.map((s, i) => (
                  <tr
                    key={s.id}
                    style={{
                      borderTop: "1px solid #1E3528",
                      background:
                        highlightTop && i < highlightTop ? "rgba(47,122,77,0.15)" : "transparent",
                    }}
                  >

                    <td style={{ padding: "6px 4px", fontWeight: 600, whiteSpace: "nowrap" }}>
                      <span

                          borderRadius: 2,

                          display: "inline-block",

                    </td>

                    <td style={thNum}>{s.pj}</td>

                    <td style={thNum}>{s.v}</td>

                    <td style={thNum}>{s.e}</td>

                    <td style={thNum}>{s.d}</td>

                    <td style={thNum}>{s.sg}</td>

                    <td style={{ ...thNum, fontWeight: 800, color: "#D4AF37" }}>{s.pts}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        );
      }

      const thNum = { textAlign: "center", padding: "4px 4px" };

      // ============ MARKET TAB ============

      function MarketTab({ teams, transfers, onPick }) {
        const [filterTeam, setFilterTeam] = useState("all");

        const players = [];

        teams.forEach((t) =>
          t.players.forEach((p) =>

              </span>

                <span

                    background: "#1A2F24",
                    color: "#8FD6A8",
                    padding: "3px 6px",
                    borderRadius: 6,
                    border: "1px solid #2F7A4D",
                    minWidth: 34,

                    <ArrowRight size={12} style={{ verticalAlign: -2, margin: "0 3px" }} />{" "}

      // ============ HISTORY TAB ============

      function HistoryTab({ tournaments, teamById, historyOpen, setHistoryOpen }) {
        if (tournaments.length === 0) {
          return (
            <div style={{ color: "#6B7A6F", fontSize: 13, textAlign: "center", padding: 30 }}>
              Nenhuma temporada encerrada ainda.
            </div>
          );
        }

        return (
          <div>
            <SectionTitle icon={<History size={15} />} text="Histórico de temporadas" />

            {tournaments
              .slice()
              .reverse()
              .map((t) => {
                const open = historyOpen === t.id;

                const standings =
                  t.format !== "mata-mata"
                    ? computeStandings(
                        t.format === "grupos" ? t.groups?.[0]?.teamIds || [] : t.teamIds,
                        t.matches,
                      )
                    : null;

                return (
                  <div key={t.id} style={panelStyle}>
                    <button
                      onClick={() => setHistoryOpen(open ? null : t.id)}
                      style={{
                        background: "none",
                        border: "none",
                        width: "100%",
                        display: "flex",
                        alignItems: "center",
                        justifyContent: "space-between",
                        cursor: "pointer",
                        padding: 0,
                        color: "#EDEFE7",
                      }}
                    >
                      <div style={{ textAlign: "left" }}>
                        <div style={{ fontSize: 11, color: "#8FD6A8", fontWeight: 700 }}>
                          TEMPORADA {t.season}
                        </div>

                        <div style={{ fontWeight: 800, fontSize: 15 }}>{t.name}</div>

                        <div
                          style={{

                            display: "flex",
                            alignItems: "center",
                            gap: 4,
                            marginTop: 2,

                          <Crown size={12} color="#D4AF37" /> {teamById(t.champion)?.name}

                      </div>

                      <ChevronDown

                      />
                    </button>

                    {open && (
                      <div style={{ marginTop: 12 }}>
                        <div style={{ fontSize: 12, color: "#6B7A6F", marginBottom: 6 }}>
                          Formato:{" "}
                          {t.format === "liga"
                            ? "Liga"
                            : t.format === "mata-mata"
                              ? "Mata-mata"

              display: "flex",

          data.player || {

            ovr: 70,
            age: 22,
            goals: 0,

          },

        return (
          <Modal title={editing ? "Editar jogador" : "Novo jogador"} onClose={onClose}>
            <label style={lbl}>Nome</label>

            <input
              style={inputStyle}
              value={form.name}
              onChange={(e) => setForm({ ...form, name: e.target.value })}
              placeholder="Nome do jogador"
              autoFocus
            />

            <label style={{ ...lbl, marginTop: 14 }}>Posição</label>

            <div style={{ display: "flex", gap: 6, flexWrap: "wrap", marginBottom: 4 }}>
              {POSITIONS.map((p) => (
                <span

                  onClick={() => setForm({ ...form, pos: p })}
                  style={chip(form.pos === p)}
                >
                  {p}
                </span>

            <div style={{ display: "flex", gap: 12, marginTop: 14 }}>

                <label style={lbl}>Overall (1-99)</label>

                <input

                  min={1}
                  max={99}
                  style={inputStyle}
                  value={form.ovr}
                  onChange={(e) =>
                    setForm({
