      /* Sports premium responsive system */
      :root {
        --canvas: #f4f6f8;

        --surface-soft: #edf1f4;
        --surface-sand: #e7ebef;
        --ink: #07110d;
        --heading: #101916;
        --body: #33413c;
        --muted: #75817c;
        --border: rgba(15,35,27,.10);
        --green: #10d981;
        --green-strong: #00b968;
        --blue: #2088ff;
        --overlay: rgba(4,10,8,.56);
        --shadow-inset: inset 0 0 0 1px var(--border);
        --shadow-soft: 0 18px 50px rgba(12,28,21,.08), inset 0 0 0 1px var(--border);
        --shadow-float: 0 22px 70px rgba(4,12,9,.18), 0 0 0 1px rgba(255,255,255,.45) inset;
      }
      html[data-theme="dark"] {
        --canvas: #050807;
        --surface: rgba(15,20,18,.88);
        --surface-soft: #151b18;
        --surface-sand: #1b221f;
        --ink: #f7fbf9;
        --heading: #f4faf7;
        --body: #c5d0cb;
        --muted: #7f8d87;
        --border: rgba(226,255,241,.09);
        --green: #21e493;
        --green-strong: #0bc87b;
        --blue: #5aa7ff;
        --overlay: rgba(0,0,0,.76);
        --shadow-soft: 0 18px 55px rgba(0,0,0,.32), inset 0 0 0 1px var(--border);
        --shadow-float: 0 24px 80px rgba(0,0,0,.52), 0 0 0 1px rgba(255,255,255,.08) inset;
      }
      html { min-height: 100%; background: var(--canvas); }
      body {
        min-height: 100vh;
        background:
          radial-gradient(900px 540px at 15% -10%, color-mix(in srgb, var(--green) 11%, transparent), transparent 64%),
          radial-gradient(720px 500px at 95% 8%, color-mix(in srgb, var(--blue) 8%, transparent), transparent 62%),
          var(--canvas);
        background-attachment: fixed;
      }
      html[data-theme="dark"] body {
        background:
          radial-gradient(850px 520px at 12% -8%, rgba(33,228,147,.12), transparent 64%),
          radial-gradient(760px 520px at 100% 4%, rgba(43,116,255,.10), transparent 64%),
          linear-gradient(180deg, #050807 0%, #080d0b 100%);
      }
      button { -webkit-tap-highlight-color: transparent; }
      @media (hover:hover) {
        button:hover { opacity: 1; transform: translateY(-1px); }
        .family-card:hover, .sports-hover:hover { transform: translateY(-2px); box-shadow: 0 20px 54px rgba(7,18,13,.10), inset 0 0 0 1px color-mix(in srgb, var(--green) 28%, var(--border)); }

      button:active { transform: scale(.975); }
      .family-card { transition: transform .2s cubic-bezier(.2,.8,.2,1), box-shadow .2s ease, background .2s ease !important; backdrop-filter: blur(18px); }

        position: relative; padding-bottom: 112px;

      .app-content { width: min(100%, 1280px); margin: 0 auto; padding: 34px 28px 130px; }

        position: fixed; left: 50%; bottom: 18px; transform: translateX(-50%);
        width: min(calc(100% - 32px), 620px); height: 70px; padding: 8px;
        display: flex; align-items: center; gap: 4px; z-index: 40;
        border-radius: 26px; background: color-mix(in srgb, var(--surface) 88%, transparent);
        border: 1px solid var(--border); box-shadow: var(--shadow-float);
        backdrop-filter: blur(24px) saturate(150%); -webkit-backdrop-filter: blur(24px) saturate(150%);

      .sports-tab { min-width: 68px; flex: 1; height: 54px; position: relative; border: 0; border-radius: 19px; background: transparent; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:4px; cursor:pointer; color:var(--muted); transition:background .18s ease,color .18s ease,transform .18s ease; }

      .sports-fab:hover { transform:translateX(-50%) translateY(-2px) scale(1.03) !important; }

      .sports-modal { animation: sportsModalIn .28s cubic-bezier(.2,.9,.2,1) both; background:color-mix(in srgb,var(--surface) 94%,transparent) !important; border:1px solid var(--border) !important; box-shadow:var(--shadow-float) !important; backdrop-filter:blur(28px) saturate(145%); -webkit-backdrop-filter:blur(28px) saturate(145%); }

      .app-content > * { animation:sportsPageIn .28s ease both; }
      #root input, #root select, #root textarea { min-height:46px; border-radius:14px !important; background:color-mix(in srgb,var(--surface) 88%,transparent) !important; transition:border-color .16s ease,box-shadow .16s ease,background .16s ease; }

        .sports-tab span:last-child { font-size:12px !important; }
        .sports-tab.is-active::after { bottom:6px; }
        .sports-fab { bottom:96px !important; }
        .sports-modal-overlay { align-items:center !important; padding:32px !important; }
        .sports-modal { border-radius:28px !important; width:min(720px,100%) !important; max-height:min(86vh,900px) !important; padding:26px !important; }
      }
      @media (min-width: 1200px) {
        .app-content { padding-left:48px; padding-right:48px; }
      }
      @media (max-width: 899px) {

        .sports-dock { bottom:10px; width:calc(100% - 20px); height:66px; border-radius:24px; }
        .sports-tab { height:50px; min-width:58px; }
        .sports-tab-label { font-size:9.5px !important; }
        .sports-fab { bottom:68px !important; width:58px !important; height:58px !important; }
        .sports-modal-overlay { align-items:flex-end !important; }
        .sports-modal { border-radius:26px 26px 0 0 !important; border-bottom:0 !important; width:100% !important; max-height:90vh !important; padding:20px 18px calc(20px + env(safe-area-inset-bottom)) !important; }
